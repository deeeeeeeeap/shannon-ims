name: Shannon IMS Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (used when manually triggered)'
        required: false
        default: 'dev'
      enable_upx:
        description: 'Enable UPX compression (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: binary-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Privacy and focused tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Repository privacy check
        run: python3 scripts/check-repository-privacy.py

      - name: Root module tests
        run: |
          go test ./internal/sim ./internal/vowifihost -count=1
          go test ./internal/db -run '^TestEnsureSMSDeliveryPartUniqueIndex' -count=1
          go test ./internal/device -run '^TestBuildVoWiFiStartProfile' -count=1

      - name: Wi-Fi Calling core tests
        working-directory: vowifi-go
        run: |
          go test ./internal/vowifi/imscore ./runtimehost/simauth ./internal/vowifi/ipsec3gpp ./runtimehost/voiceclient -run Test -skip '^TestFormatGSMAIMEIURN$' -count=1

  frontend:
    name: Build frontend assets
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        shell: bash
        run: |
          npm ci --prefix web
          npm run build --prefix web

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.artifact_arch }}
    runs-on: ubuntu-latest
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            goarm: ''
            artifact_arch: amd64
          - goarch: arm64
            goarm: ''
            artifact_arch: arm64
          - goarch: arm
            goarm: '7'
            artifact_arch: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        shell: bash
        env:
          GOPROXY: "https://proxy.golang.org,direct"
          GONOSUMCHECK: "github.com/1239t/*"
          GONOSUMDB: "github.com/1239t/*"
        run: |
          for i in 1 2 3; do
            echo "Attempt $i: downloading modules..."
            if go mod download; then
              echo "Modules downloaded successfully"
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Prepare build vars
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          BUILDTIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          REVISION="${GITHUB_SHA}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            ENABLE_UPX_RAW="${{ github.event.inputs.enable_upx }}"
          else
            ENABLE_UPX_RAW="true"
          fi

          case "${ENABLE_UPX_RAW}" in
            false|0|no|off) ENABLE_UPX=0 ;;
            *) ENABLE_UPX=1 ;;
          esac

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "buildtime=${BUILDTIME}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "enable_upx=${ENABLE_UPX}" >> "${GITHUB_OUTPUT}"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Sync frontend dist for embed
        shell: bash
        run: |
          rm -rf internal/web/dist
          cp -R web/dist internal/web/dist

      - name: Build binary
        shell: bash
        env:
          GOPROXY: "https://proxy.golang.org,direct"
          GONOSUMCHECK: "github.com/1239t/*"
          GONOSUMDB: "github.com/1239t/*"
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -trimpath -buildvcs=false -tags "with_utls nomsgpack" \
            -ldflags "-s -w -X 'github.com/1239t/vohive/internal/global.Version=${{ steps.vars.outputs.version }}' -X 'github.com/1239t/vohive/internal/global.BuildTime=${{ steps.vars.outputs.buildtime }}'" \
            -o dist/shannon-ims ./cmd/vohive

      - name: Install UPX
        if: ${{ steps.vars.outputs.enable_upx == '1' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx

      - name: Compress with UPX
        if: ${{ steps.vars.outputs.enable_upx == '1' }}
        shell: bash
        run: |
          upx --best --lzma dist/shannon-ims || upx -9 dist/shannon-ims

      - name: Package artifacts
        shell: bash
        run: |
          OUT="shannon-ims_${{ steps.vars.outputs.version }}_linux_${{ matrix.artifact_arch }}"
          mkdir -p out
          cp dist/shannon-ims "out/${OUT}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_arch }}
          path: out/*
          retention-days: 3

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Prepare release vars
        id: release_vars
        shell: bash
        run: |
          echo "release_version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist

      - name: List release files
        shell: bash
        run: ls -lh dist/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_vars.outputs.release_version }}
          generate_release_notes: true
          files: dist/*
