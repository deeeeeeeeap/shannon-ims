name: Shannon IMS Runtime Bundles

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (used when manually triggered)'
        required: false
        default: 'dev'
      enable_upx:
        description: 'Enable UPX compression (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: runtime-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Full validation and release contracts
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Sync frontend dist for validation
        shell: bash
        run: |
          rm -rf internal/web/dist
          mkdir -p internal/web
          cp -R web/dist internal/web/dist

      - name: Repository privacy check
        run: python3 scripts/check-repository-privacy.py

      - name: Python contract tests
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Root module tests
        run: go test ./... -count=1

      - name: Root static analysis
        run: go vet ./...

      - name: Wi-Fi Calling module tests
        working-directory: vowifi-go
        run: go test ./... -count=1

      - name: Wi-Fi Calling static analysis
        working-directory: vowifi-go
        run: go vet ./...

      - name: Critical race tests
        run: >-
          go test -race
          ./internal/apduarbiter
          ./internal/device
          ./internal/vowifihost
          ./pkg/logger
          -count=1

      - name: Wi-Fi Calling race tests
        working-directory: vowifi-go
        run: >-
          go test -race
          ./internal/vowifi/ipsec3gpp
          ./internal/vowifi/imscore
          ./runtimehost/simauth
          ./runtimehost/voiceclient
          -count=1

      - name: Runtime deployment script tests
        shell: bash
        run: |
          bash scripts/tests/check-runtime-deps_test.sh
          bash scripts/tests/build-strongswan-plugins_test.sh
          bash scripts/tests/install-local_test.sh
          bash scripts/tests/package-release-bundle_test.sh
          bash scripts/tests/verify-release-bundle_test.sh

  frontend:
    name: Frontend lint, typecheck, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        shell: bash
        run: |
          npm ci --prefix web
          npm run lint --prefix web
          npm run typecheck --prefix web
          npm run build --prefix web

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.artifact_arch }}
    runs-on: ubuntu-latest
    needs: [frontend, validate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            goarm: ''
            artifact_arch: amd64
          - goarch: arm64
            goarm: ''
            artifact_arch: arm64
          - goarch: arm
            goarm: '7'
            artifact_arch: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        shell: bash
        env:
          GOPROXY: "https://proxy.golang.org,direct"
          GONOSUMCHECK: "github.com/1239t/*"
          GONOSUMDB: "github.com/1239t/*"
        run: |
          for i in 1 2 3; do
            echo "Attempt $i: downloading modules..."
            if go mod download; then
              echo "Modules downloaded successfully"
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Prepare build vars
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          BUILDTIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          REVISION="${GITHUB_SHA}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            ENABLE_UPX_RAW="${{ github.event.inputs.enable_upx }}"
          else
            ENABLE_UPX_RAW="true"
          fi

          case "${ENABLE_UPX_RAW}" in
            false|0|no|off) ENABLE_UPX=0 ;;
            *) ENABLE_UPX=1 ;;
          esac

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "buildtime=${BUILDTIME}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "enable_upx=${ENABLE_UPX}" >> "${GITHUB_OUTPUT}"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Sync frontend dist for embed
        shell: bash
        run: |
          rm -rf internal/web/dist
          cp -R web/dist internal/web/dist

      - name: Build binary
        shell: bash
        env:
          GOPROXY: "https://proxy.golang.org,direct"
          GONOSUMCHECK: "github.com/1239t/*"
          GONOSUMDB: "github.com/1239t/*"
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -trimpath -buildvcs=false -tags "with_utls nomsgpack" \
            -ldflags "-s -w -X 'github.com/1239t/vohive/internal/global.Version=${{ steps.vars.outputs.version }}' -X 'github.com/1239t/vohive/internal/global.BuildTime=${{ steps.vars.outputs.buildtime }}'" \
            -o dist/shannon-ims ./cmd/vohive

      - name: Install UPX
        if: ${{ steps.vars.outputs.enable_upx == '1' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx

      - name: Compress with UPX
        if: ${{ steps.vars.outputs.enable_upx == '1' }}
        shell: bash
        run: |
          upx --best --lzma dist/shannon-ims || upx -9 dist/shannon-ims

      - name: Package runtime-aware release bundle
        shell: bash
        run: |
          bash scripts/package-release-bundle.sh \
            --binary dist/shannon-ims \
            --version "${{ steps.vars.outputs.version }}" \
            --arch "${{ matrix.artifact_arch }}" \
            --output out

      - name: Verify release bundle
        shell: bash
        run: |
          bash scripts/verify-release-bundle.sh \
            --archive "out/shannon-ims_${{ steps.vars.outputs.version }}_linux_${{ matrix.artifact_arch }}.tar.gz" \
            --arch "${{ matrix.artifact_arch }}" \
            | tee "out/shannon-ims_${{ steps.vars.outputs.version }}_linux_${{ matrix.artifact_arch }}.bundle-smoke.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-bundle-${{ matrix.artifact_arch }}
          path: |
            out/*.tar.gz
            out/*.tar.gz.sha256
            out/*.bundle-smoke.txt
          retention-days: 3

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Prepare release vars
        id: release_vars
        shell: bash
        run: |
          echo "release_version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-bundle-*
          merge-multiple: true
          path: dist

      - name: List release files
        shell: bash
        run: ls -lh dist/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_vars.outputs.release_version }}
          generate_release_notes: true
          body: |
            The release archives include the Shannon IMS binary, release/runtime manifests,
            detached and in-bundle SHA-256 checksums, deployment scripts, and custom strongSwan
            plugin sources.

            Wi-Fi Calling is not a single-binary deployment. Build the two custom plugins against
            the target machine's matching configured strongSwan source, install them into that
            runtime's plugin directory, and require `scripts/check-runtime-deps.sh` to pass before
            starting the application.

            发布包包含主程序、发布/运行时 manifest、归档内外 SHA-256 校验、部署脚本和
            自定义 strongSwan 插件源码。
            Wi-Fi Calling 不是单二进制部署：必须针对目标机匹配的 strongSwan configured source
            构建并安装两个插件，并在启动前确认 `scripts/check-runtime-deps.sh` 通过。
          files: dist/*
